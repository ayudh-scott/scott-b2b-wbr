# Sync inventory from external API to Supabase inventory_history table
# Runs daily at 02:00 UTC and can be triggered manually (workflow_dispatch).
# Retries up to 3 times on 5xx/timeouts so transient failures don't fail the run.
#
# Required GitHub SECRETS (not variables):
#   SUPABASE_URL              - Project URL, e.g. https://zrwnsitayjtgibgrhkqx.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY  - Service role key from Project → Settings → API (NOT the Account Access Token)

name: Sync inventory

on:
  schedule:
    # Daily at 9:00 AM IST (03:30 UTC)
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then echo "::error::SUPABASE_URL secret is not set"; exit 1; fi
          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then echo "::error::SUPABASE_SERVICE_ROLE_KEY secret is not set"; exit 1; fi
          echo "Secrets are set"

      - name: Invoke fetch-inventory Edge Function (with retries)
        id: invoke
        run: |
          URL="${{ secrets.SUPABASE_URL }}/functions/v1/fetch-inventory"
          MAX_ATTEMPTS=3
          RETRY_DELAY=30

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $attempt of $MAX_ATTEMPTS..."
            RESP=$(curl -s -D - -w "\n%{http_code}" -X POST "$URL" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Content-Type: application/json" \
              --max-time 120) || true
            HTTP_CODE=$(echo "$RESP" | tail -n 1)
            HTTP_BODY=$(echo "$RESP" | sed '$d' | sed '1,/^$/d')
            echo "HTTP status: $HTTP_CODE"
            echo "Response body: $HTTP_BODY"

            if [ -n "$HTTP_CODE" ] && [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "Success on attempt $attempt"
              echo "success=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Don't retry on 4xx (client error)
            if [ -n "$HTTP_CODE" ] && [ "$HTTP_CODE" -ge 400 ] && [ "$HTTP_CODE" -lt 500 ]; then
              echo "::error::fetch-inventory failed with HTTP $HTTP_CODE (client error, no retry)"
              exit 1
            fi

            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              echo "Will retry in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          echo "::error::fetch-inventory failed after $MAX_ATTEMPTS attempts (last HTTP $HTTP_CODE)"
          exit 1
